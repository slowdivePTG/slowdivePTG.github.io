<script>
    document.addEventListener("DOMContentLoaded", function () {
        const trackKey = "visitor_tracked_timestamp";
        const now = Date.now();
        const lastTracked = localStorage.getItem(trackKey);

        // 1 hour in milliseconds = 3600000
        const cooldownPeriod = 3600000;

        // Only send a tracking request if they haven't been tracked in the last 1 hour
        if (!lastTracked || now - parseInt(lastTracked) > cooldownPeriod) {
            // Fire-and-forget fetch call to track the visitor
            fetch("https://visitor-mapper.onrender.com/api/track", {
                method: "GET",
                mode: "cors",
                cache: "no-store",
            })
                .then((response) => {
                    if (response.ok) {
                        // Save the timestamp so we don't track them again today
                        localStorage.setItem(trackKey, now.toString());
                        console.debug("Visitor tracked successfully.");
                    }
                })
                .catch((error) => {
                    console.error("Failed to track visitor:", error);
                });
        } else {
            console.debug("Visitor already tracked recently. Skipping.");
        }
    });
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const iframe = document.getElementById("visitor-map");

        // Helper to check dark mode
        function checkIsDark() {
            const dataTheme =
                document.documentElement.getAttribute("data-theme");
            if (dataTheme) {
                return dataTheme === "dark";
            }
            return (
                window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: dark)").matches
            );
        }

        const currentTheme = checkIsDark() ? "dark" : "light";
        let isLive = false;
        let isCachedLoaded = false;

        // MutationObserver to watch for theme changes
        const observer = new MutationObserver(function (mutations) {
            mutations.forEach(function (mutation) {
                if (
                    mutation.type === "attributes" &&
                    mutation.attributeName === "data-theme"
                ) {
                    const isDark = checkIsDark();
                    if (iframe.contentWindow) {
                        iframe.contentWindow.postMessage(
                            { theme: isDark ? "dark" : "light" },
                            "*",
                        );
                    }
                }
            });
        });

        observer.observe(document.documentElement, {
            attributes: true,
            attributeFilter: ["data-theme"],
        });

        function bootLiveMap() {
            if (isLive) return; // Stop retrying if already live

            // Set a strict 0.5-second timeout for the fetch
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 500);

            fetch("https://visitor-mapper.onrender.com/api/track", {
                method: "GET",
                mode: "cors",
                cache: "no-store",
                signal: controller.signal
            })
                .then((response) => {
                    clearTimeout(timeoutId);
                    if (response.ok) {
                        const currentTheme = checkIsDark() ? "dark" : "light";
                        // Swap the iframe src to the live map with theme
                        iframe.src = `https://visitor-mapper.onrender.com/map?theme=${currentTheme}`;
                        isLive = true; // Mark as successful
                        console.log("Live visitor map feed connected.");
                    } else {
                        throw new Error("Network response was not ok.");
                    }
                })
                .catch((error) => {
                    clearTimeout(timeoutId);
                    // Only load the cached map if we haven't already
                    if (!isCachedLoaded) {
                        console.error(
                            "Live map feed offline, falling back to cached map.",
                            error,
                        );
                        const currentTheme = checkIsDark() ? "dark" : "light";
                        iframe.src = `/assets/cached-map.html?theme=${currentTheme}`;
                        isCachedLoaded = true;
                    }

                    // Retry every 5 seconds
                    setTimeout(bootLiveMap, 5000);
                });
        }

        // Wait a tiny bit (0.1s) to let the page settle before fetching,
        // this guarantees the static globe only appears if the backend is genuinely asleep or dead.
        setTimeout(bootLiveMap, 100);
    });
</script>

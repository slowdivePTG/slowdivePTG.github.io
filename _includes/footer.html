<!-- VISITOR TRACKER & MAP -->
<div class="visitor-map-container" style="width: 100%; max-width: 800px; margin: 2rem auto; text-align: center;">
    <!-- The iframe displaying the map -->
    <iframe 
        src="https://visitor-mapper.onrender.com/map" 
        width="100%" 
        height="400px" 
        style="border: none; background: transparent;" 
        title="Live Visitor Map"
        allowtransparency="true"
        loading="lazy">
    </iframe>
</div>
<!-- Silent Tracking Script -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const trackKey = "visitor_tracked_timestamp";
        const now = Date.now();
        const lastTracked = localStorage.getItem(trackKey);
        
        // 24 hours in milliseconds = 86400000
        const cooldownPeriod = 86400000;

        // Only send a tracking request if they haven't been tracked in the last 24 hours
        if (!lastTracked || (now - parseInt(lastTracked)) > cooldownPeriod) {
            // Fire-and-forget fetch call to track the visitor
            fetch("https://visitor-mapper.onrender.com/api/track", {
                method: "GET",
                mode: "cors", 
                cache: "no-store"
            })
            .then(response => {
                if (response.ok) {
                    // Save the timestamp so we don't track them again today
                    localStorage.setItem(trackKey, now.toString());
                    console.debug("Visitor tracked successfully.");
                }
            })
            .catch(error => {
                console.error("Failed to track visitor:", error);
            });
        } else {
            console.debug("Visitor already tracked recently. Skipping.");
        }
    });
</script>
